<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consulta Diaria BOCM</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <p class="eyebrow">BOLETÍN OFICIAL DE LA COMUNIDAD DE MADRID</p>
      <h1>Consulta Diaria BOCM <span class="version">v7</span></h1>
      <p class="subtitle">Selección diaria y búsqueda histórica de urbanismo, medio ambiente e ingeniería civil.</p>
    </header>

    <nav class="tabs" aria-label="Tipo de consulta">
      <button class="tab active" data-tab="daily" type="button">Consulta diaria</button>
      <button class="tab" data-tab="historical" type="button">Búsqueda histórica</button>
    </nav>

    <section id="daily-panel" class="tab-panel active">
      <section class="search-panel" aria-label="Consulta diaria">
        <div class="field date-field">
          <label for="date">Fecha del boletín</label>
          <input id="date" type="date" required>
        </div>
        <div class="field municipality-field">
          <label for="municipality">Municipio <span>opcional</span></label>
          <input id="municipality" type="search" list="municipality-list" autocomplete="off" placeholder="Todos los municipios">
        </div>
        <button id="search" type="button">Consultar BOCM</button>
      </section>
    </section>

    <section id="historical-panel" class="tab-panel">
      <section class="historical-panel" aria-label="Búsqueda histórica">
        <div class="field query-field">
          <label for="historical-query">Palabra o nombre de proyecto</label>
          <input id="historical-query" type="search" placeholder="Ej.: Valdecabañas, Valgrande…">
        </div>
        <div class="field">
          <label for="historical-from">Desde <span>opcional</span></label>
          <input id="historical-from" type="date">
        </div>
        <div class="field">
          <label for="historical-to">Hasta <span>opcional</span></label>
          <input id="historical-to" type="date">
        </div>
        <div class="field municipality-field">
          <label for="historical-municipality">Municipio <span>opcional</span></label>
          <input id="historical-municipality" type="search" list="municipality-list" autocomplete="off" placeholder="Todos los municipios">
        </div>
        <button id="historical-search" type="button">Buscar en histórico</button>
      </section>
      <p class="hint">La búsqueda histórica consulta la base oficial del BOCM desde febrero de 2010 y excluye Autoridades y Personal.</p>
    </section>

    <datalist id="municipality-list"></datalist>
    <section id="status" class="status" aria-live="polite"></section>
    <section id="results" class="results" aria-label="Resultados"></section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
